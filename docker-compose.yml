version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey_please_change_in_production}
      - PORT=3000

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
